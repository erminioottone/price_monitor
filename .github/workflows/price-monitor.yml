name: "Price Monitor"

on:
  schedule:
    # Runs twice a week (Tuesday and Friday at 04:00 UTC)
    - cron: "0 4 * * 2,5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "Install dependencies"
        run: pip install -r requirements.txt

      - name: "Run price monitor"
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASS:     ${{ secrets.SMTP_PASS }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python src/monitor.py

      - name: "Commit price history"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "chore: update price history [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
